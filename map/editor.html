<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="https://ys-projectfestaexecutivecommittee.github.io/SoeiDay/image/Favicon01.ico" />
  <title>会場マップ管理 | 創英祭 2026</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="https://ys-projectfestaexecutivecommittee.github.io/SoeiDay/css/base13.css">
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col font-serif">

  <header class="bg-slate-900 text-white p-4 shadow-md flex justify-between items-center z-10 relative">
    <div class="flex items-center gap-3">
      <h1 class="text-xl font-bold tracking-widest">創英祭 マップ管理</h1>
      <span class="text-xs bg-orange-500 text-white px-2 py-1 rounded-sm tracking-widest">関係者専用</span>
    </div>
    <div id="header-user-info" class="hidden text-sm font-sans flex items-center gap-4">
      <span>ログイン中: <strong id="current-user-display" class="text-lime-400"></strong></span>
      <button onclick="logout()" class="text-slate-300 hover:text-white transition">
        <i class="fa-solid fa-right-from-bracket"></i> ログアウト
      </button>
    </div>
  </header>

  <div id="loading-overlay" class="fixed inset-0 bg-white/80 z-50 flex items-center justify-center backdrop-blur-sm hidden">
    <div class="text-center">
      <i class="fa-solid fa-circle-notch fa-spin text-4xl text-slate-900 mb-4"></i>
      <p class="tracking-widest text-slate-600 font-sans">システムを準備しています...</p>
    </div>
  </div>

  
  <section id="login-section" class="flex-grow flex items-center justify-center p-4 relative fade-in">
    <div class="absolute inset-0 bg-slate-900 overflow-hidden z-0">
      <div class="absolute inset-0 bg-[url('https://yokohamasoei.sakura.ne.jp/wp/wp-content/uploads/2019/07/DSC_8659.jpg?auto=format&fit=crop&w=1920&q=80')] bg-cover bg-center opacity-20 filter grayscale"></div>
    </div>
    
    <div class="bg-white p-8 md:p-12 w-full max-w-md shadow-2xl relative z-10 border-t-4 border-orange-500">
      <h2 class="text-3xl font-bold mb-2 text-center tracking-widest">ログイン</h2>
      <p class="text-center text-slate-500 text-sm mb-8 font-sans">専用のIDとパスワードを入力してください</p>
      
      <div id="login-error" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6 text-sm font-sans"></div>

      <div class="space-y-6 font-sans">
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2">ログインID</label>
          <input type="text" id="login-id" class="w-full px-4 py-3 border border-gray-300 rounded focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition" placeholder="admin">
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2">パスワード</label>
          <input type="password" id="login-password" class="w-full px-4 py-3 border border-gray-300 rounded focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition" placeholder="••••••••">
        </div>
        <button onclick="attemptLogin()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 px-4 rounded tracking-widest transition duration-300 flex justify-center items-center gap-2">
          <i class="fa-solid fa-lock"></i> ログインする
        </button>
      </div>
    </div>
  </section>

  
  <section id="dashboard-section" class="flex-grow hidden bg-slate-50 fade-in w-full max-w-full overflow-x-hidden">
    <div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
      
      
      <div class="flex border-b border-gray-300 mb-6 font-sans">
        <button onclick="switchTab('map')" id="tab-btn-map" class="py-3 px-6 text-center font-medium border-b-2 border-slate-900 text-slate-900 bg-white/50 transition">
          <i class="fa-solid fa-map-location-dot mr-2"></i> マップ部屋情報管理
        </button>
        <button onclick="switchTab('users')" id="tab-btn-users" class="py-3 px-6 text-center font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition">
          <i class="fa-solid fa-users-gear mr-2"></i> アカウント管理
        </button>
      </div>

      
      <div id="tab-content-map" class="block">
        
        <div class="mb-6 flex flex-wrap justify-center gap-2 sm:gap-3">
          <button onclick="switchFloor('h1')" id="btn-h1" class="floor-btn active-floor px-4 py-2 text-sm border bg-slate-900 text-white border-transparent rounded-sm transition">本館 1F</button>
          <button onclick="switchFloor('h2')" id="btn-h2" class="floor-btn px-4 py-2 text-sm border border-gray-300 text-slate-700 hover:border-orange-500 rounded-sm transition">本館 2F</button>
          <button onclick="switchFloor('h3')" id="btn-h3" class="floor-btn px-4 py-2 text-sm border border-gray-300 text-slate-700 hover:border-orange-500 rounded-sm transition">本館 3F / 新館 B1F</button>
          <button onclick="switchFloor('s1')" id="btn-s1" class="floor-btn px-4 py-2 text-sm border border-gray-300 text-slate-700 hover:border-orange-500 rounded-sm transition">本館 4F / 新館 1F / 体育館</button>
          <button onclick="switchFloor('s2')" id="btn-s2" class="floor-btn px-4 py-2 text-sm border border-gray-300 text-slate-700 hover:border-orange-500 rounded-sm transition">新館 2F</button>
          <button onclick="switchFloor('s3')" id="btn-s3" class="floor-btn px-4 py-2 text-sm border border-gray-300 text-slate-700 hover:border-orange-500 rounded-sm transition">新館 3F</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start relative">
          
          
          <div class="lg:col-span-2 bg-white p-4 shadow-md border border-gray-100 rounded-sm min-w-0">
            <div class="flex items-center justify-between mb-3 border-b border-gray-100 pb-2">
              <h2 id="current-floor-title" class="font-bold tracking-widest text-slate-900 flex items-center gap-2">
                <i class="fa-solid fa-map text-orange-500"></i>
                <span>本館 1F フロアマップ</span>
              </h2>
              <span class="text-xs text-slate-500 font-sans bg-orange-50 px-2 py-1 rounded border border-orange-100">
                <i class="fa-solid fa-hand-pointer mr-1"></i> マップをクリックして位置指定
              </span>
            </div>

            <div id="map-viewport" class="map-canvas-container flex items-center justify-center border border-gray-200">
              <div id="blueprint-render-target" class="w-full h-full relative flex items-center justify-center min-w-0">
                <div class="text-center text-slate-400 font-light text-sm">マップ読み込み中...</div>
              </div>
            </div>
          </div>

          
          <div class="lg:col-span-1 bg-white p-6 shadow-md border border-gray-100 sticky top-6 rounded-sm z-10 w-full max-w-full">
            <h3 id="form-title" class="text-lg font-bold mb-4 border-l-4 border-orange-500 pl-3 tracking-widest">
              新規追加 (クリックで位置指定)
            </h3>
            
            <div class="space-y-4 font-sans">
              <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">部屋ID <span class="text-xs font-normal text-slate-400">(自動生成)</span></label>
                <input type="text" id="room-id" readonly class="w-full px-3 py-1.5 border border-gray-300 rounded bg-gray-100 text-slate-500 text-xs font-mono">
              </div>
              
              <input type="hidden" id="room-floor" value="h1">

              <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">部屋名 / 教室名</label>
                <input type="text" id="room-name" placeholder="例: 101教室" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-orange-500 text-sm">
              </div>

              <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">企画タイトル <span class="text-red-500">*</span></label>
                <input type="text" id="room-title" placeholder="例: 3年A組 縁日屋台" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-orange-500 text-sm">
              </div>

              <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">カテゴリ <span class="text-red-500">*</span></label>
                <select id="room-category" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-orange-500 bg-white text-sm">
                  <option value="food">模擬店・飲食</option>
                  <option value="exhibition">展示・体験</option>
                  <option value="stage">ステージ・公演</option>
                  <option value="other">本部・休憩所・その他</option>
                </select>
              </div>

              <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">詳細説明</label>
                <textarea id="room-desc" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-orange-500 text-sm" placeholder="企画の詳しい説明"></textarea>
              </div>

              <div>
                <label class="block text-xs font-bold text-slate-700 mb-1">タグ (カンマ区切り)</label>
                <input type="text" id="room-tags" placeholder="例: 体験, 景品あり" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-orange-500 text-sm">
              </div>

              <div class="flex gap-2">
                <div class="flex-1">
                  <label class="block text-xs font-bold text-slate-700 mb-1">X座標 <span class="text-red-500">*</span></label>
                  <input type="text" id="room-posx" readonly class="w-full px-3 py-1.5 border border-gray-300 rounded bg-orange-50 text-orange-700 text-sm" placeholder="タップして取得">
                </div>
                <div class="flex-1">
                  <label class="block text-xs font-bold text-slate-700 mb-1">Y座標 <span class="text-red-500">*</span></label>
                  <input type="text" id="room-posy" readonly class="w-full px-3 py-1.5 border border-gray-300 rounded bg-orange-50 text-orange-700 text-sm" placeholder="タップして取得">
                </div>
              </div>

              <div class="pt-3 flex gap-2">
                <button onclick="resetForm()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-slate-700 font-bold py-2 px-3 rounded transition text-sm">
                  キャンセル
                </button>
                <button onclick="saveRoom()" class="flex-[2] bg-orange-600 hover:bg-orange-700 text-white font-bold py-2 px-3 rounded transition text-sm flex items-center justify-center gap-2">
                  <i class="fa-solid fa-floppy-disk"></i> 保存
                </button>
              </div>
            </div>
          </div>

          
          <div class="lg:col-span-3 bg-white p-6 shadow-md border border-gray-100 mt-2 w-full max-w-full">
            <h3 class="text-xl font-bold mb-4 tracking-widest">登録済み部屋・ブース一覧</h3>
            <div class="overflow-x-auto font-sans w-full">
              <table class="w-full text-left border-collapse min-w-[600px]">
                <thead>
                  <tr class="bg-slate-100 text-slate-600 text-xs">
                    <th class="p-2 border-b border-gray-200">フロア</th>
                    <th class="p-2 border-b border-gray-200">部屋名</th>
                    <th class="p-2 border-b border-gray-200">企画タイトル</th>
                    <th class="p-2 border-b border-gray-200">カテゴリ</th>
                    <th class="p-2 border-b border-gray-200 text-center w-24">操作</th>
                  </tr>
                </thead>
                <tbody id="rooms-list-table">
                  <tr><td colspan="5" class="p-8 text-center text-slate-400 text-sm">データを読み込んでいます...</td></tr>
                </tbody>
              </table>
            </div>
          </div>

        </div>
      </div>

      
      <div id="tab-content-users" class="hidden space-y-8">
        <div class="bg-orange-50 border-l-4 border-orange-500 p-4 mb-6">
          <p class="text-sm text-orange-800 font-sans">
            <strong>【セキュリティの注意】</strong><br>
            新しい管理者アカウントを作成できます。<code>admin</code> はマスターアカウントのため削除できません。
          </p>
        </div>

        <div class="bg-white p-6 md:p-8 shadow-md border border-gray-100">
          <h3 class="text-xl font-bold mb-6 border-l-4 border-orange-500 pl-3">新しいアカウントを作成</h3>
          
          <div class="flex flex-col md:flex-row gap-6 font-sans items-end">
            <div class="flex-1 w-full">
              <label class="block text-sm font-bold text-slate-700 mb-2">ログインID <span class="text-red-500">*</span></label>
              <input type="text" id="new-user-id" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:border-orange-500">
            </div>
            <div class="flex-1 w-full">
              <label class="block text-sm font-bold text-slate-700 mb-2">パスワード <span class="text-red-500">*</span></label>
              <input type="password" id="new-user-password" class="w-full px-4 py-2 border border-gray-300 rounded focus:outline-none focus:border-orange-500">
            </div>
            <div class="w-full md:w-auto">
              <button onclick="createUser()" class="w-full md:w-auto bg-orange-600 hover:bg-orange-700 text-white font-bold py-2.5 px-6 rounded transition duration-300 flex items-center justify-center gap-2">
                <i class="fa-solid fa-user-plus"></i> 追加
              </button>
            </div>
          </div>
        </div>

        <div class="bg-white p-6 md:p-8 shadow-md border border-gray-100">
          <h3 class="text-lg font-bold mb-6 tracking-widest">登録済みアカウント一覧</h3>
          <div class="overflow-x-auto font-sans">
            <table class="w-full text-left border-collapse min-w-[500px]">
              <thead>
                <tr class="bg-slate-100 text-slate-600 text-sm">
                  <th class="p-3 border-b border-gray-200">ログインID</th>
                  <th class="p-3 border-b border-gray-200">登録日時</th>
                  <th class="p-3 border-b border-gray-200 text-center">操作</th>
                </tr>
              </thead>
              <tbody id="users-list-table">
                <tr><td colspan="3" class="p-8 text-center text-slate-400">読み込み中...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </section>

  <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 font-sans pointer-events-none"></div>

  
  <script type="module" src="https://ys-projectfestaexecutivecommittee.github.io/SoeiDay/javascript/base15.js"></script>
</body>
</html>
